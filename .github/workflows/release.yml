name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build exe
        run: |
          pyinstaller --onefile --name rbxbundle rbxbundle/__main__.py

      - name: Upload exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rbxbundle.exe
